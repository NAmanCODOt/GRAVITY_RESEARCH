<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gRaviTy Research</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap');

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
}

/* ===== LOADER ===== */
#loader {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loader-text span {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    opacity: 0;
    display: inline-block;
    transform: translateY(40px);
    animation: reveal 0.6s forwards;
}

.loader-text span:nth-child(1){animation-delay:0.2s;}
.loader-text span:nth-child(2){animation-delay:0.4s;}
.loader-text span:nth-child(3){animation-delay:0.6s;}
.loader-text span:nth-child(4){animation-delay:0.8s;}
.loader-text span:nth-child(5){animation-delay:1s;}
.loader-text span:nth-child(6){animation-delay:1.2s;}
.loader-text span:nth-child(7){animation-delay:1.4s;}

@keyframes reveal {
    to {
        opacity: 1;
        transform: translateY(0);
        color: #d4af37;
        text-shadow: 0 0 15px rgba(212,175,55,0.6);
    }
}

.fade-out {
    animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
    to {
        opacity: 0;
        visibility: hidden;
    }
}

/* ===== GLASS SIDEBAR ===== */
.sidebar {
    height: 100%;
    width: 320px;
    position: fixed;
    top: 0;
    left: -340px;
    z-index: 1000;
    background: rgba(20,20,20,0.35);
    backdrop-filter: blur(25px);
    border-right: 1px solid rgba(212,175,55,0.2);
    box-shadow: 0 0 40px rgba(212,175,55,0.08);
    transition: 0.5s;
    opacity: 0;
}

.sidebar.active {
    left: 0;
    opacity: 1;
}

.sidebar-content {
    padding: 60px 30px;
}

.sidebar a {
    display: block;
    padding: 14px 0;
    color: #9ca3af;
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    color: #d4af37;
    transform: translateX(8px);
}

.close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    color: #d4af37;
    cursor: pointer;
}

/* ===== OVERLAY ===== */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
    opacity: 0;
    visibility: hidden;
    transition: 0.4s;
    z-index: 999;
}

.overlay.active {
    opacity: 1;
    visibility: visible;
}

/* ===== NAV ===== */
.nav {
    padding: 10px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.menu-icon {
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.menu-icon span {
    width: 6px;
    height: 6px;
    background: #d4af37;
    border-radius: 50%;
}

/* ===== LOGO ===== */
.logo {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: #fff;
    text-decoration: none;
    position: relative;
}

.logo span { color: #d4af37; }

.logo::after {
    content: "Research";
    position: absolute;
    bottom: -14px;
    left: 0;
    font-size: 10px;
    letter-spacing: 3px;
    color: #6b7280;
}

/* ===== HERO ===== */
.hero {
    text-align: center;
    padding: 120px 20px;
}

.hero h1 {
    font-size: 60px;
    color: #d4af37;
    font-family: 'Playfair Display', serif;
}

.hero p {
    color: #9ca3af;
    max-width: 600px;
    margin: auto;
}

/* ===== BUTTON ===== */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 28px;
    border: 1px solid #d4af37;
    color: #d4af37;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: #d4af37;
    color: #000;
}

/* ===== FOOTER ===== */
.footer {
    text-align: center;
    padding: 40px;
    color: #6b7280;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="loader-text">
        <span>g</span><span>R</span><span>a</span><span>v</span><span>i</span><span>T</span><span>y</span>
    </div>
</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="closeNav()"></div>

<!-- SIDEBAR -->
<div id="mySidebar" class="sidebar">
    <span class="close-btn" onclick="closeNav()">&times;</span>
    <div class="sidebar-content">
        <a href="#">Market Insights</a>
        <a href="#">Wealth Tools</a>
        <a href="#">Vision</a>
        <a href="#">About</a>
    </div>
</div>

<!-- NAV -->
<div class="nav">
    <div class="menu-icon" onclick="openNav()">
        <span></span><span></span><span></span>
    </div>

    <a href="#" class="logo">g<span>R</span>aviTy</a>

    <div style="width:30px;"></div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Decoding the Pulse of the Market</h1>
    <p>Understanding financial markets, businesses, and industry trends.</p>
    <a href="#" class="btn">Explore Insights</a>
</div>

<!-- FOOTER -->
<div class="footer">
© 2026 gRaviTy Research
</div>

<script>
function openNav() {
    document.getElementById("mySidebar").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeNav() {
    document.getElementById("mySidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}

/* LOADER CONTROL */
window.addEventListener("load", function() {
    setTimeout(() => {
        document.getElementById("loader").classList.add("fade-out");
    }, 2200);
});
</script>

</body>
</html>
