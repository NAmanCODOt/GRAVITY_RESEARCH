<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gRaviTy Research | Understanding Market Forces</title>

    <style>
.nav:hover + #mySidebar,
#mySidebar:hover {
    width: 350px;
}

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap');

html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #ffffff;
    overflow-x: hidden;
}

/* --- SIDEBAR NAVIGATION --- */
.sidebar {
    height: 100%;
    width: 0;
    position: fixed;
    z-index: 1000;
    top: 0;
    left: 0;
    background-color: rgba(10, 10, 10, 0.98);
    backdrop-filter: blur(20px);
    overflow-x: hidden;
    transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
    padding-top: 60px;
    border-right: 1px solid #d4af37;
}

.sidebar-content { padding: 0 32px; min-width: 280px; }

.sidebar a {
    padding: 12px 0;
    text-decoration: none;
    font-size: 18px;
    color: #9ca3af;
    display: block;
    transition: 0.3s;
    font-weight: 300;
}

.sidebar a:hover { color: #d4af37; padding-left: 10px; }

.sidebar .close-btn {
    position: absolute;
    top: 15px;
    right: 25px;
    font-size: 36px;
    cursor: pointer;
    color: #d4af37;
}

.menu-label {
    padding: 20px 0 10px 0;
    font-size: 11px;
    color: #d4af37;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.7;
}

/* --- COUNTDOWN STYLES --- */
.countdown-box {
    background: rgba(212, 175, 55, 0.05);
    border: 1px solid rgba(212, 175, 55, 0.2);
    padding: 20px 10px;
    border-radius: 12px;
    margin: 20px 0;
    text-align: center;
}

.timer-display {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    color: #d4af37;
    font-weight: 400;
}

.timer-unit {
    display: inline-block;
    min-width: 35px;
}

.timer-label {
    font-size: 10px;
    color: #6b7280;
    text-transform: uppercase;
    display: block;
    margin-top: 4px;
}

/* --- NAVIGATION BAR --- */
.nav {
    padding: 10px 25px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #1f1f1f;
    position: sticky;
    top: 0;
    z-index: 100;
}

.menu-icon {
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.menu-icon span {
    display: block;
    width: 6px;
    height: 6px;
    background-color: #d4af37;
    border-radius: 50%;
    transition: 0.3s;
}

.menu-icon:hover span { transform: scale(1.4); background-color: #ffffff; }

.nav img { width: 140px; }

/* --- HERO SECTION --- */
.hero { text-align: center; padding: 120px 20px; position: relative; }
.hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(36px, 8vw, 64px); color: #d4af37; margin-bottom: 20px; line-height: 1.1; }
.hero p { max-width: 700px; margin: 0 auto 40px auto; font-size: 18px; color: #9ca3af; line-height: 1.8; }

.btn {
    margin: 10px;
    padding: 14px 32px;
    background: transparent;
    border: 1px solid #d4af37;
    border-radius: 8px;
    color: #d4af37;
    font-weight: 500;
    cursor: pointer;
    transition: 0.4s;
    text-decoration: none;
    display: inline-block;
}

.btn:hover { background: #d4af37; color: black; box-shadow: 0 0 25px rgba(212, 175, 55, 0.3); }

.section { padding: 80px 20px; text-align: center; }
.section h2 { font-family: 'Playfair Display', serif; color: #d4af37; font-size: 32px; margin-bottom: 40px; }

.card {
    background: rgba(15, 15, 15, 0.6);
    backdrop-filter: blur(8px);
    padding: 40px;
    margin: 25px auto;
    border-radius: 16px;
    max-width: 650px;
    border: 1px solid #1f1f1f;
    color: #d1d5db;
    transition: 0.5s ease;
    line-height: 1.7;
}
.card:hover { border-color: #d4af37; transform: translateY(-8px); }

.footer { text-align: center; padding: 60px; font-size: 12px; color: #6b7280; border-top: 1px solid #1f1f1f; letter-spacing: 1px; }

/* --- BACKGROUND ORBS --- */
.gold-orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
.orb1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(212,175,55,0.1), transparent 70%); top: 10%; left: -10%; }
.orb2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(212,175,55,0.05), transparent 70%); bottom: 10%; right: -5%; }

body > * { position: relative; z-index: 1; }

    </style>
</head>
