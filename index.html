<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Insights | gRaviTy Research</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@200;300;400;500;600&display=swap');

        :root {
            --gold: #d4af37;
            --bg-black: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-black);
            color: #ffffff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            
            /* TOTAL LOCKDOWN */
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            cursor: default;
        }

        .nav {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .nav img { height: 45px; width: auto; }

        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 42px;
            text-align: center;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        .insight-card {
            background: rgba(15,15,15,0.7);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 40px;
            margin-bottom: 30px;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
            transform: translateY(30px);
        }

        .insight-card.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .insight-card:hover {
            border-color: var(--gold);
            background: rgba(20,20,20,0.9);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            padding-bottom: 15px;
        }

        .company-name {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: var(--gold);
        }

        .price-info { text-align: right; }
        
        .live-price { 
            font-size: 18px; 
            display: block; 
            color: var(--gold);
            animation: pricePulse 4s infinite;
        }

        @keyframes pricePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .pct-change { font-size: 13px; font-weight: 600; letter-spacing: 1px; }

        .analysis-content {
            line-height: 1.9;
            color: #bbb;
            font-size: 16px;
            font-weight: 300;
        }

        .back-nav { text-align: center; margin-top: 60px; padding-bottom: 80px; }
        .back-link { 
            color: var(--gold); 
            text-decoration: none; 
            font-size: 11px; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            border: 1px solid var(--gold); 
            padding: 14px 28px; 
            transition: 0.4s; 
            font-weight: 600;
        }
        .back-link:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }

        #loader { 
            text-align: center; 
            color: var(--gold); 
            letter-spacing: 6px; 
            font-size: 10px; 
            margin-top: 100px; 
            text-transform: uppercase;
            font-weight: 600;
        }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;" onselectstart="return false;">

<div class="nav">
    <div style="width: 22px;"></div>
    <a href="index.html"><img src="logo.png" alt="Logo"></a>
    <div style="width: 22px;"></div> 
</div>

<div class="container">
    <h1>Market Insights</h1>
    <div id="loader">Synchronizing with gRaviTy Terminal...</div>
    <div id="insights-container"></div>

    <div class="back-nav">
        <a href="index.html" class="back-link">Return to Home</a>
    </div>
</div>

<script>
    async function loadInsights() {
        const SHEETY_URL = 'https://api.sheety.co/27bb86a119d2050ea00da106b6e33003/gRaviTyResearchTerminal/sheet1'; 

        try {
            const response = await fetch(SHEETY_URL);
            const data = await response.json();
            const container = document.getElementById('insights-container');
            const loader = document.getElementById('loader');

            loader.style.display = 'none';

            const rows = data.sheet1;

            rows.forEach((report, index) => {
                const priceVal = report.price ? parseFloat(report.price).toLocaleString('en-IN', { minimumFractionDigits: 2 }) : "0.00";
                const rawChange = report.change ? parseFloat(report.change) * 100 : 0;
                const changeDisplay = rawChange.toFixed(2);
                const color = rawChange >= 0 ? '#00ff88' : '#ff4444';
                const sign = rawChange >= 0 ? '+' : '';

                const card = document.createElement('div');
                card.className = 'insight-card';
                card.style.transitionDelay = (index * 0.15) + 's';

                card.innerHTML = `
                    <div class="card-header">
                        <div class="company-name">${report.company || 'Private Entity'}</div>
                        <div class="price-info">
                            <span class="live-price">₹${priceVal}</span>
                            <span class="pct-change" style="color: ${color}">${sign}${changeDisplay}%</span>
                        </div>
                    </div>
                    <div class="analysis-content">
                        ${report.analysis || 'Awaiting deep-dive analysis from the research desk...'}
                    </div>
                `;

                container.appendChild(card);
                // Force a reflow for the animation
                setTimeout(() => card.classList.add('loaded'), 100);
            });

        } catch (error) {
            console.error("Connection Error:", error);
            document.getElementById('loader').innerText = "TERMINAL OFFLINE. CHECK API STATUS.";
        }
    }

    // Call the engine
    loadInsights();

    // ULTIMATE LOCKDOWN SCRIPT
    document.onkeydown = function(e) {
        if (
            e.keyCode === 123 || 
            ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) || 
            ((e.ctrlKey || e.metaKey) && (e.keyCode === 85 || e.keyCode === 83))
        ) {
            return false;
        }
    };
    
    // Prevent dragging text/images
    document.addEventListener('dragstart', function(e) { e.preventDefault(); });
</script>
</body>
</html>
