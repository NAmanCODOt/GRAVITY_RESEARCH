<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Insights | gRaviTy Research</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@200;300;400;500;600&display=swap');
        :root { --gold: #d4af37; --bg-black: #050505; --glass: rgba(255, 255, 255, 0.03); }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-black); color: #fff; user-select: none; cursor: default; }
        .nav { padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav img { height: 45px; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .controls { margin-bottom: 40px; text-align: center; }
        #searchBar { width: 100%; max-width: 400px; background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.2); padding: 12px 20px; color: var(--gold); outline: none; margin-bottom: 20px; }
        .filter-btn { background: transparent; border: 1px solid #222; color: #666; padding: 6px 15px; font-size: 10px; text-transform: uppercase; cursor: pointer; margin: 0 5px; }
        .filter-btn.active { border-color: var(--gold); color: var(--gold); }
        .insight-card { background: rgba(15,15,15,0.7); border: 1px solid rgba(255,255,255,0.05); padding: 35px; margin-bottom: 25px; opacity: 0; transform: translateY(20px); transition: 0.6s; display: none; }
        .insight-card.visible { display: block; opacity: 1; transform: translateY(0); }
        .company-name { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); }
        .price-box { text-align: right; }
        .ai-verdict-box { background: rgba(212, 175, 55, 0.05); border-left: 3px solid var(--gold); padding: 15px; margin: 20px 0; font-style: italic; font-size: 14px; color: #ddd; }
        .analysis-content { color: #888; font-size: 15px; line-height: 1.7; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="nav">
    <div style="width:22px"></div>
    <a href="index.html"><img src="logo.png" alt="Logo"></a>
    <div style="width:22px"></div>
</div>

<div class="container">
    <div class="controls">
        <input type="text" id="searchBar" placeholder="Search Terminal..." onkeyup="render()">
        <div id="filters">
            <button class="filter-btn active" onclick="setF('all', this)">All</button>
            <button class="filter-btn" onclick="setF('tech', this)">Tech</button>
            <button class="filter-btn" onclick="setF('finance', this)">Finance</button>
        </div>
    </div>
    <div id="insights-container"></div>
</div>

<script>
    let allData = [];
    let filter = 'all';

    async function getData() {
        const URL = 'https://api.sheety.co/27bb86a119d2050ea00da106b6e33003/gRaviTyResearchTerminal/sheet1';
        const res = await fetch(URL);
        const json = await res.json();
        allData = json.sheet1;
        render();
    }

    function render() {
        const container = document.getElementById('insights-container');
        const search = document.getElementById('searchBar').value.toLowerCase();
        const now = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        container.innerHTML = '';

        allData.forEach(item => {
            const matches = (filter === 'all' || item.sector?.toLowerCase() === filter) && 
                            (item.company.toLowerCase().includes(search) || item.ticker.toLowerCase().includes(search));
            
            if (matches) {
                const change = (parseFloat(item.change) * 100).toFixed(2);
                const color = change >= 0 ? '#00ff88' : '#ff4444';
                const card = document.createElement('div');
                card.className = 'insight-card visible';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; font-size:9px; color:#444; margin-bottom:15px; text-transform:uppercase;">
                        <span>Terminal ID: G-RAV-0${Math.floor(Math.random()*9+1)}</span>
                        <span>Analyzed at: ${now} IST</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div class="company-name">${item.company}</div>
                        <div class="price-box">
                            <div style="font-size:18px;">₹${item.price.toLocaleString('en-IN')}</div>
                            <div style="color:${color}; font-size:11px;">${change >= 0 ? '▲' : '▼'} ${change}%</div>
                        </div>
                    </div>
                    <div class="ai-verdict-box">
                        <span style="color:var(--gold); font-size:9px; text-transform:uppercase; display:block; margin-bottom:5px;">AI Terminal Insight:</span>
                        "${item.verdict}"
                    </div>
                    <div class="analysis-content">${item.analysis || 'Standard market trajectory analysis active.'}</div>
                `;
                container.appendChild(card);
            }
        });
    }

    function setF(s, b) {
        filter = s;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        render();
    }

    getData();
</script>
</body>
</html>
