<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAVITY | CLOCK</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@100;300;600&display=swap');

        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            letter-spacing: 0.2em;
            overflow: hidden;
        }

        /* Gold Gradient Text Effect */
        .gold-text {
            background: linear-gradient(to bottom, #f9f295 0%, #e0aa3e 25%, #b88a44 50%, #e0aa3e 75%, #f9f295 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* Large Punchy Clock */
        #clock {
            font-family: 'Playfair Display', serif;
            font-size: clamp(80px, 15vw, 180px);
            font-weight: 700;
            margin: 0;
            line-height: 0.9;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3));
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2)); opacity: 0.9; }
            50% { filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.5)); opacity: 1; }
        }

        /* The Divider */
        .divider {
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 50px 0;
        }

        /* Countdown Data */
        .countdown-container {
            display: flex;
            gap: 60px;
            text-align: center;
        }

        .unit .value {
            font-size: 32px;
            font-weight: 300;
            color: #fff;
            display: block;
        }

        .unit .label {
            font-size: 10px;
            color: #d4af37;
            font-weight: 600;
            margin-top: 10px;
            letter-spacing: 0.4em;
        }

        /* Absolute Positions */
        .brand-stamp {
            position: absolute;
            top: 50px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            border-left: 1px solid #d4af37;
            padding-left: 15px;
        }

        .launch-tag {
            position: absolute;
            bottom: 50px;
            font-size: 14px;
            color: #fff;
            font-weight: 300;
        }

        .launch-tag b {
            color: #d4af37;
            font-weight: 600;
        }

        .exit-link {
            position: absolute;
            bottom: 50px;
            left: 50px;
            text-decoration: none;
            color: #333;
            font-size: 10px;
            border: 1px solid #333;
            padding: 8px 20px;
            transition: 0.4s;
        }

        .exit-link:hover {
            color: #d4af37;
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.05);
        }

        /* Decorative Gold Orb */
        .orb {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="orb"></div>
    <div class="brand-stamp">GRAVITY RESEARCH<br>INTERNAL_TIME</div>

    <div id="clock" class="gold-text">00:00:00</div>

    <div class="divider"></div>

    <div class="countdown-container">
        <div class="unit">
            <span class="value" id="days">000</span>
            <span class="label">DAYS</span>
        </div>
        <div class="unit">
            <span class="value" id="hours">00</span>
            <span class="label">HOURS</span>
        </div>
        <div class="unit">
            <span class="value" id="minutes">00</span>
            <span class="label">MINUTES</span>
        </div>
        <div class="unit">
            <span class="value" id="seconds">00</span>
            <span class="label">SECONDS</span>
        </div>
    </div>

    <div class="launch-tag">GRAND LAUNCH : <b>25 APRIL 2026</b></div>

    <a href="index.html" class="exit-link">CLOSE TERMINAL</a>

    <script>
        function update() {
            const now = new Date();
            
            // Time logic
            document.getElementById('clock').textContent = 
                now.getHours().toString().padStart(2, '0') + ":" +
                now.getMinutes().toString().padStart(2, '0') + ":" +
                now.getSeconds().toString().padStart(2, '0');

            // Countdown logic
            const target = new Date("April 25, 2026 00:00:00").getTime();
            const diff = target - now.getTime();

            if (diff > 0) {
                document.getElementById('days').textContent = Math.floor(diff / 86400000).toString().padStart(3, '0');
                document.getElementById('hours').textContent = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
                document.getElementById('minutes').textContent = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                document.getElementById('seconds').textContent = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            }
        }

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
