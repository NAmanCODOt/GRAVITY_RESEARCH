<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launch | gRaviTy Research</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@200;300;400;600&display=swap');

:root {
    --gold: #d4af37;
    --bg: #050505;
}

/* ================= PROTECTION STYLES ================= */
body {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

/* ================= SEAMLESS PAGE TRANSITIONS ================= */
body {
    opacity: 1;
    transition: opacity 0.4s ease-in-out;
}

body.fade-out {
    opacity: 0;
}

/* ================= CUSTOM CURSOR ================= */
* { cursor: none !important; }

.cursor-dot {
    width: 6px;
    height: 6px;
    background: var(--gold);
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 10000;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px var(--gold);
    transition: width 0.2s ease, height 0.2s ease, box-shadow 0.2s ease;
}

.cursor-dot.hover-state {
    width: 12px;
    height: 12px;
    box-shadow: 0 0 15px var(--gold);
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
    overflow: hidden;
}

/* sidebar */
.sidebar {
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: rgba(5,5,5,0.98);
    backdrop-filter: blur(15px);
    overflow-x: hidden;
    transition: 0.4s ease;
    padding-top: 80px;
    z-index: 1000;
    border-right: 1px solid rgba(212,175,55,0.2);
}

.sidebar.open { width: 260px; }

.sidebar a {
    display: block;
    padding: 15px 30px;
    color: #888;
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    color: var(--gold);
    padding-left: 40px;
}

.menu-label {
    padding: 20px 30px 5px;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* nav */
.nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 30px;
    z-index: 10;
    box-sizing: border-box;
}

.menu-icon { cursor: pointer; }

.menu-icon span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--gold);
    margin: 4px 0;
}

.logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 2px;
    cursor: pointer;
}

/* orbs */
.gold-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(140px);
    pointer-events: none;
    z-index: 1;
    opacity: 0.15;
}

.orb1 { width: 600px; height: 600px; background: var(--gold); animation: move1 25s infinite linear; }
.orb2 { width: 500px; height: 500px; background: var(--gold); animation: move2 30s infinite linear; }

@keyframes move1 { 0% { top: -10%; left: -10%; } 50% { top: 60%; left: 70%; } 100% { top: -10%; left: -10%; } }
@keyframes move2 { 0% { bottom: -10%; right: -10%; } 50% { bottom: 60%; right: 70%; } 100% { bottom: -10%; right: -10%; } }

/* main container */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    position: relative;
    z-index: 2;
}

.label {
    font-size: 11px;
    letter-spacing: 8px;
    color: var(--gold);
    margin-bottom: 40px;
    text-transform: uppercase;
    opacity: 0.8;
}

/* ================= TIMER DIVISIONS ================= */
.timer {
    display: flex;
    align-items: center;
    justify-content: center;
}

.unit-box {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(212, 175, 55, 0.1);
    backdrop-filter: blur(10px);
    padding: 30px 40px;
    border-radius: 12px;
    min-width: 120px;
    text-align: center;
}

.unit-value {
    font-size: clamp(40px, 8vw, 80px);
    color: var(--gold);
    font-weight: 200;
    line-height: 1;
}

.unit-label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 10px;
}

.separator {
    font-size: 40px;
    color: rgba(212, 175, 55, 0.3);
    padding: 0 20px;
    font-weight: 100;
}

/* launch text */
.launch-text {
    position: absolute;
    bottom: 100px;
    text-align: center;
    width: 100%;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    letter-spacing: 4px;
    color: var(--gold);
}

.footer {
    position: absolute;
    bottom: 40px;
}

.footer-link {
    color: #555;
    text-decoration: none;
    font-size: 10px;
    border: 1px solid #222;
    padding: 10px 25px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: 0.3s;
}

.footer-link:hover {
    border-color: var(--gold);
    color: var(--gold);
}

/* ================= MOBILE RESPONSIVENESS ================= */
@media screen and (max-width: 768px) {
    * { cursor: auto !important; }
    .cursor-dot { display: none !important; }
    .sidebar.open { width: 100%; }
    
    .timer {
        gap: 10px;
    }
    .unit-box {
        padding: 15px 20px;
        min-width: 70px;
    }
    .separator { display: none; }
    .unit-value { font-size: 32px; }
}

</style>
</head>

<body oncontextmenu="return false;">

<div class="cursor-dot" id="cursor-dot"></div>

<div id="sidebar" class="sidebar">
    <div class="menu-label">Navigation</div>
    <a href="index.html">Home</a>
    <a href="aboutus.html">About Us</a>
    <a href="vision.html">Our Vision</a>
    <div class="menu-label">Intelligence</div>
    <a href="calc.html">Wealth Calculators</a>
    <a href="clock.html">Market Clock</a>
    <a href="contactus.html">Contact Us</a>
</div>

<div class="nav">
    <div class="menu-icon" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <div class="logo" onclick="goHome()">gRaviTy</div>
</div>

<div class="gold-orb orb1"></div>
<div class="gold-orb orb2"></div>

<div class="container">
    <div class="label">System Launch Imminent</div>

    <div class="timer">
        <div class="unit-box">
            <div id="days" class="unit-value">00</div>
            <div class="unit-label">Days</div>
        </div>
        
        <div class="separator">:</div>

        <div class="unit-box">
            <div id="hours" class="unit-value">00</div>
            <div class="unit-label">Hours</div>
        </div>

        <div class="separator">:</div>

        <div class="unit-box">
            <div id="minutes" class="unit-value">00</div>
            <div class="unit-label">Minutes</div>
        </div>

        <div class="separator">:</div>

        <div class="unit-box">
            <div id="seconds" class="unit-value">00</div>
            <div class="unit-label">Seconds</div>
        </div>
    </div>
</div>

<div class="launch-text">
    PAN INDIA — 30 MAY 2026
</div>

<div class="footer">
    <a href="index.html" class="footer-link">Return to Core</a>
</div>

<script>
/* PROTECTION SCRIPT */
document.onkeydown = function(e) {
    if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) return false;
};

/* TOUCH DETECTION */
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

/* CUSTOM CURSOR */
if (!isTouchDevice) {
    const cursorDot = document.getElementById('cursor-dot');
    window.addEventListener('mousemove', (e) => {
        cursorDot.style.left = e.clientX + 'px';
        cursorDot.style.top = e.clientY + 'px';
    });
    document.querySelectorAll('a, .menu-icon, .logo, .unit-box').forEach(el => {
        el.addEventListener('mouseenter', () => cursorDot.classList.add('hover-state'));
        el.addEventListener('mouseleave', () => cursorDot.classList.remove('hover-state'));
    });
}

/* MENU */
const sidebar = document.getElementById("sidebar");
const menuBtn = document.getElementById("menuBtn");
menuBtn.addEventListener("click", (e) => { e.stopPropagation(); sidebar.classList.toggle("open"); });
document.addEventListener("click", () => sidebar.classList.remove("open"));

/* SEAMLESS PAGE TRANSITIONS */
function transitionTo(url) {
    document.body.classList.add('fade-out');
    setTimeout(() => { window.location.href = url; }, 400);
}

document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll('a[href]').forEach(link => {
        link.addEventListener('click', function(e) {
            const target = this.getAttribute('href');
            if (target && !target.startsWith('http') && !target.startsWith('mailto')) {
                e.preventDefault();
                transitionTo(target);
            }
        });
    });
});

function goHome() { transitionTo('index.html'); }

/* TIMER LOGIC */
const target = new Date("2026-05-30T00:00:00+05:30").getTime();

function updateClock() {
    const now = new Date().getTime();
    const diff = target - now;

    if(diff <= 0) {
        document.querySelector(".timer").innerHTML = "<div class='unit-value' style='letter-spacing:10px'>SYSTEM LIVE</div>";
        return;
    }

    const d = Math.floor(diff/86400000);
    const h = Math.floor((diff%86400000)/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);

    document.getElementById("days").innerText = d < 10 ? "0"+d : d;
    document.getElementById("hours").innerText = h < 10 ? "0"+h : h;
    document.getElementById("minutes").innerText = m < 10 ? "0"+m : m;
    document.getElementById("seconds").innerText = s < 10 ? "0"+s : s;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
