<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | gRaviTy Research</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap');

:root
{
    --gold: #d4af37;
    --bg: #050505;
}

html
{
    scroll-behavior: smooth;
}

body
{
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
}

/* bg */
body::before
{
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 20%, rgba(212,175,55,0.06), transparent 50%);
    z-index: 0;
}

/* nav */
.nav
{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 30px;

    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(5,5,5,0.9);
    backdrop-filter: blur(8px);
    z-index: 1000;
}

.home
{
    color: var(--gold);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 2px;
}

.logo
{
    height: 36px;
}

/* main */
.container
{
    max-width: 700px;
    margin: auto;
    padding: 140px 20px 80px;
    text-align: center;
}

h1
{
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: clamp(32px, 6vw, 56px);
    margin-bottom: 10px;
}

h1::after
{
    content: "";
    display: block;
    width: 60px;
    height: 2px;
    margin: 14px auto;
    background: var(--gold);
    opacity: 0.6;
}

p
{
    color: #8f8f8f;
    font-size: 16px;
    line-height: 1.7;
}

/* contact */
.contact-box
{
    margin-top: 50px;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 25px;
}

/* row */
.contact-item
{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 25px;
}

/* icon */
.icon
{
    width: 22px;
    height: 22px;
    fill: var(--gold);
}

/* link */
.link
{
    color: #aaa;
    text-decoration: none;
    transition: 0.2s;
    font-size: 15px;
}

.link:hover
{
    color: var(--gold);
}

/* button */
.btn
{
    margin-top: 40px;
    padding: 12px 26px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover
{
    background: var(--gold);
    color: black;
}

/* footer */
.footer
{
    text-align: center;
    padding: 40px 20px;
    font-size: 12px;
    color: #555;
}

body > *
{
    position: relative;
    z-index: 1;
}

/* scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #000; }
::-webkit-scrollbar-thumb { background: #d4af37; }

html
{
    scrollbar-width: thin;
    scrollbar-color: #d4af37 #000;
}

</style>
</head>

<body>

<!-- nav -->
<div class="nav">

    <a class="home" href="index.html">← HOME</a>

    <img src="logo.png" class="logo">

</div>

<!-- main -->
<div class="container">

    <h1>Contact</h1>

    <p>
        For collaborations, research inquiries, or serious discussions —
        reach out directly.
    </p>

    <div class="contact-box">

        <!-- EMAIL -->
        <div class="contact-item">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M2 4h20v16H2V4zm10 7L4 6h16l-8 5zm0 2l8-5v10H4V8l8 5z"/>
            </svg>

            <a class="link" href="mailto:gravity.insights07@gmail.com">
                gravity.insights07@gmail.com
            </a>
        </div>

        <!-- INSTAGRAM -->
        <div class="contact-item">
            <svg class="icon" viewBox="0 0 24 24">
                <path d="M7 2h10a5 5 0 015 5v10a5 5 0 01-5 5H7a5 5 0 01-5-5V7a5 5 0 015-5zm5 5a5 5 0 100 10 5 5 0 000-10zm6-1a1 1 0 110 2 1 1 0 010-2z"/>
            </svg>

            <a class="link" href="https://www.instagram.com/gravity.insights/" target="_blank">
                @gravity.insights
            </a>
        </div>

    </div>

    <button class="btn" onclick="goHome()">
        Back to Home
    </button>

</div>

<div class="footer">
    © 2026 gRaviTy Research
</div>

<script>

function goHome()
{
    window.location.href = "index.html";
}

</script>

</body>
</html>
