<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Gravity Insights</title>
    <style>
        /* Base Reset & Typography */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            min-height: 100vh;
            background-color: #f4f7f6; /* Soft, clean background */
            color: #333;
        }

        /* -------------------------
           SIDE PANEL NAVIGATION
           ------------------------- */
        .side-panel {
            width: 260px;
            background-color: #1a2530; /* Deep navy for Gravitas */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            padding: 2.5rem 2rem;
            position: fixed;
            height: 100%;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .logo-container {
            margin-bottom: 3.5rem;
        }

        /* Logo acts as Home Button */
        .logo {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.2;
            display: block;
        }

        .logo span {
            color: #4a90e2; /* Trust-building blue accent */
            display: block;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 5px;
        }
        
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links a {
            color: #8b9eb0;
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.3s ease, padding-left 0.3s ease;
            display: block;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #ffffff;
            font-weight: 600;
            padding-left: 5px; /* Slight indent on hover for interactivity */
        }

        /* -------------------------
           MAIN CONTENT AREA
           ------------------------- */
        .main-content {
            margin-left: 260px; /* Offsets the fixed side panel */
            padding: 4rem;
            width: calc(100% - 260px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .contact-wrapper {
            background: #ffffff;
            padding: 3.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 800px;
        }

        h1 {
            color: #1a2530;
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
            font-weight: 700;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        /* -------------------------
           FORM STYLES
           ------------------------- */
        .form-row {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            flex: 1;
            margin-bottom: 1.5rem;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1a2530;
            font-size: 0.95rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.9rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 1rem;
            background-color: #fcfcfc;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: #4a90e2;
            outline: none;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 160px;
        }
        
        button {
            background-color: #1a2530;
            color: #ffffff;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            font-weight: 600;
            width: 100%;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #2c3e50;
        }

        button:active {
            transform: scale(0.98);
        }

        /* -------------------------
           MOBILE RESPONSIVENESS
           ------------------------- */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .side-panel {
                width: 100%;
                height: auto;
                position: relative;
                padding: 1.5rem;
                align-items: center;
                text-align: center;
            }
            .nav-links {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 1.5rem;
                margin-top: 1rem;
            }
            .nav-links a:hover, .nav-links a.active {
                padding-left: 0;
            }
            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 2rem 1rem;
            }
            .contact-wrapper {
                padding: 2rem 1.5rem;
            }
            .form-row {
                flex-direction: column;
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <aside class="side-panel">
        <div class="logo-container">
            <a href="index.html" class="logo">
                GRAVITY 
                <span>Insights</span>
            </a>
        </div>
        
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="research.html">Research</a></li>
            <li><a href="contactus.html" class="active">Contact</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="contact-wrapper">
            <h1>Get in Touch</h1>
            <p class="subtitle">Interested in our latest research, consulting services, or custom data analysis? Send us a message and our team will get back to you shortly.</p>

            <form action="YOUR_FORM_ENDPOINT" method="POST">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" required placeholder="Jane">
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" required placeholder="Doe">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Institutional Email</label>
                        <input type="email" id="email" name="email" required placeholder="jane@institution.edu">
                    </div>
                    <div class="form-group">
                        <label for="organization">Organization / Company</label>
                        <input type="text" id="organization" name="organization" placeholder="University or Corp">
                    </div>
                </div>

                <div class="form-group">
                    <label for="subject">Inquiry Type</label>
                    <input type="text" id="subject" name="subject" required placeholder="e.g., Research Collaboration, Data Request">
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" required placeholder="How can Gravity Insights help you today?"></textarea>
                </div>

                <button type="submit">Send Message</button>
            </form>
        </div>
    </main>

</body>
</html>
