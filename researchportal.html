<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Launch | gRaviTy Research</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@100;200;300;400;600&display=swap');

:root {
    --gold: #d4af37;
    --gold-dim: rgba(212, 175, 55, 0.3);
    --gold-glow: rgba(212, 175, 55, 0.15);
    --bg: #050505;
}

/* ================= PROTECTION STYLES ================= */
body {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

/* ================= SEAMLESS PAGE TRANSITIONS ================= */
body {
    opacity: 1;
    transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

body.fade-out {
    opacity: 0;
}

/* ================= CUSTOM CURSOR (GPU ACCELERATED) ================= */
* { cursor: none !important; }

.cursor-dot {
    width: 6px;
    height: 6px;
    background: var(--gold);
    position: fixed;
    top: 0;
    left: 0;
    border-radius: 50%;
    pointer-events: none;
    z-index: 10000;
    transform: translate(-50%, -50%); 
    box-shadow: 0 0 15px var(--gold);
    transition: width 0.3s ease, height 0.3s ease, box-shadow 0.3s ease;
    will-change: transform;
}

.cursor-dot.hover-state {
    width: 30px;
    height: 30px;
    background: rgba(212, 175, 55, 0.05);
    border: 1px solid var(--gold);
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
}

/* ================= SIDEBAR & MENU ================= */
.sidebar {
    width: 0;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    background: #0a0a0a;
    overflow-x: hidden;
    transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    padding-top: 100px;
    z-index: 2000;
    border-right: 1px solid var(--gold-dim);
}

.sidebar.open {
    width: 270px;
}

.sidebar-content { 
    min-width: 270px;
    padding: 0 40px; 
}

.menu-label {
    margin-top: 25px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.7;
}

.sidebar a {
    display: block;
    position: relative;
    padding: 14px 0;
    color: #888;
    text-decoration: none;
    transition: 0.25s;
    font-size: 14px;
}

.sidebar a:hover {
    color: var(--gold);
    transform: translateX(6px);
}

/* "You Are Here" Active Indicator */
.sidebar a.active {
    color: var(--gold);
    padding-left: 12px;
}

.sidebar a.active::before {
    content: '';
    position: absolute;
    left: -4px;
    top: 50%;
    transform: translateY(-50%);
    width: 4px;
    height: 4px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--gold);
}

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
    z-index: 1500;
}

.overlay.show {
    opacity: 1;
    pointer-events: all;
}

/* ================= NAV & HOME BUTTON ================= */
.nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 25px 40px;
    z-index: 2100;
    box-sizing: border-box;
    background: rgba(5,5,5,0.8);
    backdrop-filter: blur(8px);
}

.nav-left {
    display: flex;
    align-items: center;
    gap: 30px;
}

/* PREMIUM HOME BUTTON */
.home-btn {
    display: inline-flex;
    align-items: center;
    padding: 8px 20px;
    background: rgba(212, 175, 55, 0.04);
    border: 1px solid rgba(212, 175, 55, 0.3);
    color: var(--gold);
    text-decoration: none;
    font-size: 10px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    backdrop-filter: blur(4px);
}

.home-btn::before {
    content: '←';
    margin-right: 8px;
    font-size: 12px;
    transition: transform 0.4s ease;
}

.home-btn:hover {
    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
    transform: translateY(-2px);
}

.home-btn:hover::before { transform: translateX(-3px); }

/* Animated Hamburger */
.menu-icon { 
    position: relative;
    cursor: pointer; 
    z-index: 2200;
}

.menu-icon span {
    display: block;
    width: 22px;
    height: 1px;
    background: var(--gold);
    margin: 6px 0;
    transition: 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
    transform-origin: left center;
}

.menu-icon.active span:nth-child(1) { transform: rotate(45deg); width: 24px; }
.menu-icon.active span:nth-child(2) { opacity: 0; }
.menu-icon.active span:nth-child(3) { transform: rotate(-45deg); width: 24px; }

.logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 3px;
    text-decoration: none;
}

/* ORBS */
.gold-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(160px);
    pointer-events: none;
    z-index: 1;
    opacity: 0.12;
    will-change: transform;
}

.orb1 { width: 700px; height: 700px; background: var(--gold); animation: move1 28s infinite linear; }
.orb2 { width: 600px; height: 600px; background: #fff; animation: move2 35s infinite linear; }

@keyframes move1 { 0% { transform: translate3d(0, 0, 0); } 50% { transform: translate3d(90vw, 80vh, 0); } 100% { transform: translate3d(0, 0, 0); } }
@keyframes move2 { 0% { transform: translate3d(0, 0, 0); } 50% { transform: translate3d(-90vw, -80vh, 0); } 100% { transform: translate3d(0, 0, 0); } }

/* Main Container */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    position: relative;
    z-index: 2;
}

.label {
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 10px;
    color: white;
    text-transform: uppercase;
    margin-bottom: 60px;
    opacity: 0.8;
}

/* ================= TIMER STYLING ================= */
.timer {
    display: flex;
    align-items: center;
    justify-content: center;
}

.unit-box {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(212, 175, 55, 0.4);
    backdrop-filter: blur(10px);
    padding: 35px 25px;
    border-radius: 4px;
    min-width: 140px;
    text-align: center;
    transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    will-change: transform;
}

.unit-box:hover {
    border-color: var(--gold);
    transform: translateY(-5px);
}

.unit-value {
    font-family: 'Inter', sans-serif;
    font-size: clamp(45px, 8vw, 85px);
    color: var(--gold);
    font-weight: 100;
    line-height: 1;
    letter-spacing: -2px;
}

.unit-label {
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-top: 15px;
}

.separator {
    width: 1px;
    height: 100px;
    background: var(--gold);
    box-shadow: 0 0 20px var(--gold);
    margin: 0 40px;
    opacity: 0.7;
}

.launch-text {
    position: absolute;
    bottom: 120px;
    text-align: center;
    width: 100%;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    letter-spacing: 5px;
}

.launch-text span { color: var(--gold); }

/* ================= MOBILE OPTIMIZATION ================= */
@media screen and (max-width: 768px) {
    * { cursor: auto !important; }
    .cursor-dot { display: none !important; }
    .sidebar.open { width: 100%; }
    .nav { padding: 20px; }
    .nav-left { gap: 15px; }
    .timer { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 90%; }
    .separator { display: none; } 
    .unit-box { min-width: auto; padding: 20px 10px; }
}
</style>
</head>
<body oncontextmenu="return false;">

<div class="cursor-dot" id="cursor-dot"></div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div id="sidebar" class="sidebar">
    <div class="sidebar-content">
        <div class="menu-label">System</div>
        <a href="clock.html" class="active">Market Clock</a> <div class="menu-label">Advanced Tools</div>
        <a href="calc.html">Wealth Calculators</a>

        <div class="menu-label">Research</div>
        <a href="researchportal.html">Research Portal</a>

        <div class="menu-label">Our Firm</div>
        <a href="aboutus.html">About Us</a>
        <a href="vision.html">Our Vision</a>

        <div class="menu-label">Access</div>
        <a href="contactus.html">Contact Us</a>
    </div>
</div>

<div class="nav">
    <div class="nav-left">
        <div class="menu-icon" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <a href="index.html" class="home-btn">Home</a>
    </div>
    <a href="index.html" class="logo-text">gRaviTy</a>
</div>

<div class="gold-orb orb1"></div>
<div class="gold-orb orb2"></div>

<div class="container">
    <div class="label">System Launch</div>
    <div class="timer">
        <div class="unit-box"><div id="days" class="unit-value">00</div><div class="unit-label">Days</div></div>
        <div class="separator"></div>
        <div class="unit-box"><div id="hours" class="unit-value">00</div><div class="unit-label">Hours</div></div>
        <div class="separator"></div>
        <div class="unit-box"><div id="minutes" class="unit-value">00</div><div class="unit-label">Minutes</div></div>
        <div class="separator"></div>
        <div class="unit-box"><div id="seconds" class="unit-value">00</div><div class="unit-label">Seconds</div></div>
    </div>
</div>

<div class="launch-text">
    PAN INDIA — <span>30 MAY 2026</span>
</div>

<script>
/* PROTECTION SCRIPT */
document.onkeydown = function(e) {
    if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) return false;
};

/* TOUCH DETECTION */
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

/* CUSTOM CURSOR - GPU ACCELERATED */
if (!isTouchDevice) {
    const cursorDot = document.getElementById('cursor-dot');
    window.addEventListener('mousemove', (e) => {
        cursorDot.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%)`;
    });
    
    document.querySelectorAll('a, button, .menu-icon, .logo-text, .unit-box').forEach(el => {
        el.addEventListener('mouseenter', () => cursorDot.classList.add('hover-state'));
        el.addEventListener('mouseleave', () => cursorDot.classList.remove('hover-state'));
    });
}

/* MENU LOGIC */
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
    document.querySelector(".menu-icon").classList.toggle("active");
}

/* SEAMLESS PAGE TRANSITIONS */
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll('a[href]').forEach(link => {
        link.addEventListener('click', function(e) {
            const targetUrl = this.getAttribute('href');
            if (targetUrl && !targetUrl.startsWith('http') && !targetUrl.startsWith('mailto')) {
                e.preventDefault(); 
                document.body.classList.add('fade-out'); 
                setTimeout(() => { window.location.assign(targetUrl); }, 400);
            }
        });
    });
});

/* TIMER LOGIC */
const target = new Date("2026-05-30T00:00:00+05:30").getTime();

function updateClock() {
    const now = new Date().getTime();
    const diff = target - now;
    if(diff <= 0) {
        document.querySelector(".container").innerHTML = "<div class='unit-value' style='letter-spacing: 10px;'>SYSTEM LIVE</div>";
        return;
    }
    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);
    document.getElementById("days").innerText = d < 10 ? "0" + d : d;
    document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
    document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
    document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;
}

setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
